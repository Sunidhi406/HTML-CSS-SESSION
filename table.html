<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <link rel="stylesheet" href="table.css">
</head>
<body>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th colspan="2">Name</th>
                    <th>Class</th>
                    <th>Roll No</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td colspan="2">Ranvir Singh</td>
                    <td>IOT H</td>
                    <td>1234</td>
                </tr>
                
                <tr>
                    <td colspan="2">Sambhav Jain</td>
                    <td>IOT H</td>
                    <td>5678</td>
                </tr>

                <tr>
                    <td colspan="2">Suraj Kumar</td> <!-- merges columns -->
                    <td>IOT H</td>
                    <td>9012</td>
                </tr>
            </tbody>
            <tfoot>
                <!-- any total value,sum etc -->
            </tfoot>
        </table>
    </div>
</body>
</html>
