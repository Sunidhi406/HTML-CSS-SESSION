<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>

<body>
    <!-- Lists -->
    <h1>Unordered List</h1>    

    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Grapes</li>
    </ul>

    <h1>Ordered List</h1>

    <ol>
        <li>Ranvir</li>
        <li>Suraj</li>
        <li>Gurvinder</li>
    </ol>

    <h1>Description List</h1>

    <dl>
        <dt>Ranvir Singh</dt>
        <dd>He is a coder</dd>

        <dt>Suraj kumar</dt>
        <dd>He is learning</dd>
    </dl>
</body>

</html>
