<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="container">
        <form action="">
            <h1 class="Heading">Login Form</h1>

            <label for="name" id="name">Name:</label>
            <input type="text" placeholder="Enter your name" id="label1" maxlength="20">

            <label for="contact" id="contact">Contact No:</label>
            <input type="number" placeholder="Enter your number(10 digit)" id="label1">

            <label for="email" id="email">Email Id:</label>
            <input type="email" placeholder="Enter your email" id="label1">

            <input type="button" value="submit" id="submit">
        </form>
    </div>
</body>
</html>
